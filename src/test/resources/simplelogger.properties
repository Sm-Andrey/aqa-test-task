# Уровень логирования по умолчанию
org.slf4j.simpleLogger.defaultLogLevel=info
# Уровень для конкретных пакетов
org.slf4j.simpleLogger.log.com.aqa=debug
# WireMock
org.slf4j.simpleLogger.log.com.github.tomakehurst.wiremock=warn
org.slf4j.simpleLogger.log.WireMock=warn
# RestAssured
# Полностью отключаем логи запросов/ответов
org.slf4j.simpleLogger.log.io.restassured=warn
org.slf4j.simpleLogger.log.io.restassured.filter=warn
org.slf4j.simpleLogger.log.io.restassured.internal=warn
# Показывать имя потока, время и короткое имя логгера
org.slf4j.simpleLogger.showThreadName=true
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=true
# Формат даты
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS